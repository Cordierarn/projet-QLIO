<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T'Elefan – Connexion</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo_telefan.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-img-wrap">
        <img src="{{ url_for('static', filename='img/logo_telefan.png') }}" alt="T'Elefan">
      </div>
      <div class="sub">MES 4.0 – Système de Pilotage de Production</div>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label" for="email">Identifiant</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="admin@telefan.fr" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Se souvenir de moi</label>
      </div>

      <button class="btn-primary" type="submit">Se connecter</button>
    </form>

    <div class="login-footer">
      <a href="#">Mot de passe oublié ?</a><br><br>
      T'Elefan &copy; 2026 – Fabriqué en France
    </div>
  </div>
</div>
</body>
</html>
